{% extends 'base.html' %}
{% block content %}
<h2 class="mb-3">Crop Yield Prediction</h2>

<form method="post" class="card p-4 shadow-sm">
  <div class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Rainfall (mm)</label>
      <input class="form-control" type="number" name="rainfall" step="0.1" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">Pesticide Usage (units)</label>
      <input class="form-control" type="number" name="pesticide" step="0.1" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">Average Temperature (°C)</label>
      <input class="form-control" type="number" name="temperature" step="0.1" required>
    </div>
  </div>
  <button class="btn btn-success mt-3" type="submit">Predict Yield</button>
</form>

{% if prediction %}
  <div class="mt-4 card p-4 border-success">
    <h4>Prediction Result</h4>
    <pre class="mb-0">{{ prediction }}</pre>
  </div>
{% endif %}
{% endblock %}
