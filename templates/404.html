{% extends "base.html" %}
{% block title %}{{ code|default(404) }} – AgriSmart{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center py-5" style="min-height:70vh">
  <div data-aos="zoom-in">
    <div class="error-code">{{ code | default(404) }}</div>
    <h2 class="mt-3 mb-2">{{ message | default("Page Not Found") }}</h2>
    <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-ag-primary btn-lg px-5">
      <i class="bi bi-house-door me-2"></i>Back to Home
    </a>
  </div>
</div>
{% endblock %}
